services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm picoclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: picoclaw-agent-full
    profiles:
      - agent
    env_file:
      - ../.env.local
    volumes:
      - ../config:/root/.picoclaw
      - picoclaw-workspace:/root/.picoclaw/workspace
      - picoclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: picoclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    env_file:
      - ../.env.local
    volumes:
      - ../config:/root/.picoclaw
      - picoclaw-workspace:/root/.picoclaw/workspace
      - picoclaw-npm-cache:/root/.npm
    command: ["gateway"]

  # ─────────────────────────────────────────────
  # PicoClaw Launcher (Web Console + Gateway) - Built from local source
  #   docker compose -f docker/docker-compose.full.yml --profile launcher up -d
  # ─────────────────────────────────────────────
  picoclaw-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.launcher.local
    container_name: picoclaw-launcher-full
    restart: unless-stopped
    profiles:
      - launcher
    env_file:
      - ../.env.local
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ../config:/root/.picoclaw
      - picoclaw-workspace:/root/.picoclaw/workspace

volumes:
  picoclaw-workspace:
  picoclaw-npm-cache: # Cache npm packages to speed up MCP server installations
